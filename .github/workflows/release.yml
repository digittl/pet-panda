name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build PandaPal.app
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading v if present (v1.2.3 → 1.2.3)
          VERSION="${TAG#v}"

          # The tag flows untrusted into the signed appcast XML and into
          # GITHUB_OUTPUT. Reject anything that isn't a plain semver so a
          # crafted tag can't inject XML/markup into the published appcast or
          # smuggle extra keys into GITHUB_OUTPUT.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver (expected vX.Y.Z or X.Y.Z)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (tag $TAG)"

      - name: Build
        working-directory: PandaPal
        env:
          PANDA_VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcodebuild \
            -project PandaPal.xcodeproj \
            -scheme PandaPal \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="$PANDA_VERSION" \
            CURRENT_PROJECT_VERSION="$PANDA_VERSION" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Generate INSTALL.txt
        working-directory: PandaPal
        run: |
          cat > INSTALL.txt <<'EOF'
          PandaPal — Installation
          =======================

          1. Drag PandaPal.app into your Applications folder.
          2. The first time you open it, macOS will say it can't be opened because
             it isn't notarized. Right-click → Open NO LONGER bypasses this on
             current macOS, so you have to strip the quarantine flag from
             Terminal:

                xattr -dr com.apple.quarantine /Applications/PandaPal.app

             Then double-click PandaPal.app as usual.

          3. A paw print icon will appear in your menu bar with controls
             (Show/Hide, Reset Position, Size, Gender, Quit). The panda lives
             on your screen — click to pat, drag to move, and she wanders on
             her own every few seconds.

          4. PandaPal checks for updates automatically once a day. You can also
             trigger a check from the menu bar via "Check for Updates…".

          Enjoy your panda!
          EOF

      - name: Package zip
        working-directory: PandaPal
        run: |
          APP_PATH="build/Build/Products/Release/PandaPal.app"
          mkdir -p zip-staging
          cp -R "$APP_PATH" zip-staging/
          cp INSTALL.txt zip-staging/
          # Sparkle expects the zip to contain PandaPal.app at the top level
          # (alongside INSTALL.txt). ditto preserves Mac metadata properly.
          (cd zip-staging && ditto -c -k --sequesterRsrc --keepParent PandaPal.app ../PandaPal.zip)
          (cd zip-staging && zip -j ../PandaPal.zip INSTALL.txt)

      - name: Build DMG
        working-directory: PandaPal
        run: |
          APP_PATH="build/Build/Products/Release/PandaPal.app"
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          cp INSTALL.txt dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "PandaPal" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            PandaPal.dmg

      - name: Sign zip with Sparkle EdDSA key
        id: sign
        working-directory: PandaPal
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Pin the Sparkle release to the same version the app links against
          # (see Package.resolved) and verify its checksum before running any of
          # its binaries. sign_update is handed the EdDSA private signing key, so
          # a tampered or MITM'd tarball would mean key compromise — never run it
          # unverified.
          SPARKLE_VERSION="2.9.2"
          SPARKLE_SHA256="1cb340cbbef04c6c0d162078610c25e2221031d794a3449d89f2f56f4df77c95"
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          echo "${SPARKLE_SHA256}  sparkle.tar.xz" | shasum -a 256 -c -

          mkdir -p sparkle && tar -xJf sparkle.tar.xz -C sparkle
          SIGN_UPDATE="$(find sparkle -name sign_update -type f | head -n 1)"
          chmod +x "$SIGN_UPDATE"

          # Write the key to a private temp file and guarantee its removal even
          # if signing fails (the success-only rm left the key on disk on error).
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          umask 077
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          SIG_OUTPUT="$("$SIGN_UPDATE" -f "$KEY_FILE" PandaPal.zip)"

          # sign_update prints `sparkle:edSignature="..." length="..."`
          ED_SIG="$(echo "$SIG_OUTPUT" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')"
          LENGTH="$(echo "$SIG_OUTPUT" | sed -E 's/.*length="([^"]+)".*/\1/')"

          {
            echo "ed_signature=$ED_SIG"
            echo "length=$LENGTH"
          } >> "$GITHUB_OUTPUT"
          echo "Signed PandaPal.zip — length=$LENGTH"

      - name: Generate appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          ED_SIG: ${{ steps.sign.outputs.ed_signature }}
          LENGTH: ${{ steps.sign.outputs.length }}
        run: |
          mkdir -p appcast-out
          PUBDATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/PandaPal.zip"
          RELEASE_PAGE="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          cat > appcast-out/appcast.xml <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
              <channel>
                  <title>PandaPal</title>
                  <link>https://digittl.github.io/pet-panda/appcast.xml</link>
                  <description>Most recent PandaPal release.</description>
                  <language>en</language>
                  <item>
                      <title>Version ${VERSION}</title>
                      <link>${RELEASE_PAGE}</link>
                      <sparkle:version>${VERSION}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                      <pubDate>${PUBDATE}</pubDate>
                      <enclosure
                          url="${RELEASE_URL}"
                          sparkle:edSignature="${ED_SIG}"
                          length="${LENGTH}"
                          type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          EOF
          cat appcast-out/appcast.xml

      - name: Publish appcast to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast-out
          publish_branch: gh-pages
          keep_files: false
          commit_message: "appcast: ${{ steps.version.outputs.tag }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.4.4
        with:
          files: |
            PandaPal/PandaPal.zip
            PandaPal/PandaPal.dmg
            PandaPal/INSTALL.txt
